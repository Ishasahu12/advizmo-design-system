<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recurring Review - Batch</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg:#f2f2f7; --card:#fff; --text:#1c1c1e; --text2:#8e8e93; --border:rgba(0,0,0,.06); --blue:#0a84ff; --green:#166f47; --green-bg:#e8f8ec; --amber:#c2790a; --amber-bg:#fff5e6; --red:#b91c1c; --red-bg:#ffe8e8; --blue-bg:#e8f0ff; --gray:#aeaeb2; --gray-bg:#f5f5f5; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); width:430px; margin:0 auto; min-height:100vh; -webkit-font-smoothing:antialiased; }
  .status-bar { display:flex; justify-content:space-between; align-items:center; padding:12px 24px 8px; font-family:'IBM Plex Sans',sans-serif; font-weight:600; font-size:15px; }
  .notch { width:126px; height:34px; background:#000; border-radius:0 0 20px 20px; }
  .status-icons { display:flex; gap:6px; align-items:center; }
  .header { display:flex; align-items:center; padding:8px 20px 12px; gap:12px; }
  .back-arrow { width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .back-arrow svg { width:20px; height:20px; }
  .header-text { flex:1; }
  .header-text h1 { font-family:'IBM Plex Sans',sans-serif; font-size:20px; font-weight:700; line-height:1.2; }
  .header-text .subtitle { font-size:14px; color:var(--text2); margin-top:2px; }
  .content { padding:0 16px 140px; }
  .select-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .select-bar .count { font-size:14px; color:var(--text2); }
  .select-bar .count strong { color:var(--text); font-weight:600; }
  .select-bar .links { display:flex; gap:12px; }
  .select-bar .links button { font-size:13px; color:var(--blue); font-weight:500; cursor:pointer; background:none; border:none; font-family:'Inter',sans-serif; }
  .batch-item { display:flex; align-items:center; background:var(--card); border-radius:12px; padding:14px; margin-bottom:8px; border:1px solid var(--border); gap:12px; transition:all 0.15s; }
  .batch-item.selected { border-color:var(--blue); background:var(--blue-bg); }
  .checkbox { width:24px; height:24px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; cursor:pointer; transition:all 0.15s; }
  .batch-item.selected .checkbox { background:var(--blue); border-color:var(--blue); }
  .checkbox svg { width:14px; height:14px; opacity:0; transition:opacity 0.15s; }
  .batch-item.selected .checkbox svg { opacity:1; }
  .m-icon { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Sans',sans-serif; font-weight:700; font-size:14px; color:#fff; flex-shrink:0; }
  .batch-info { flex:1; min-width:0; }
  .batch-name { font-size:15px; font-weight:600; color:var(--text); }
  .diff-badge { display:inline-block; padding:3px 8px; border-radius:20px; font-size:11px; font-weight:600; font-family:'IBM Plex Sans',sans-serif; }
  .diff-badge.red { background:var(--red-bg); color:var(--red); }
  .diff-badge.green { background:var(--green-bg); color:var(--green); }
  .diff-badge.blue { background:var(--blue-bg); color:var(--blue); }
  .diff-badge.amber { background:var(--amber-bg); color:var(--amber); }
  .diff-badge.gray { background:var(--gray-bg); color:var(--text2); }
  .batch-chevron { color:var(--text2); flex-shrink:0; }
  .bottom-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:430px; background:rgba(255,255,255,0.96); backdrop-filter:blur(20px); border-top:1px solid var(--border); padding:14px 20px 32px; display:flex; align-items:center; gap:12px; z-index:10; }
  .sel-count { font-size:14px; color:var(--text2); white-space:nowrap; }
  .sel-count strong { color:var(--text); font-weight:600; }
  .bar-btn { flex:1; padding:12px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; text-align:center; }
  .bar-btn.accept { background:var(--green); color:#fff; border:none; }
  .bar-btn.reject { background:transparent; color:var(--red); border:1.5px solid var(--red); }
  .bottom-nav { position:fixed; bottom:56px; left:50%; transform:translateX(-50%); width:430px; background:rgba(255,255,255,0.92); backdrop-filter:blur(20px); border-top:1px solid var(--border); display:flex; justify-content:space-around; align-items:center; padding:8px 0 28px; z-index:5; }
  .nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10px; color:var(--text2); cursor:pointer; }
  .nav-item.active { color:var(--blue); }
  .nav-icon { width:24px; height:24px; }
</style>
</head>
